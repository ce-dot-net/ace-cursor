name: Publish Extension

on:
  release:
    types: [created]
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build (production bundle via esbuild)
        run: npm run build:prod

      - name: Run tests
        run: xvfb-run -a npm test

      # vsce walks the prod-deps tree by default (dependencies: true). Combined
      # with .vscodeignore's blanket node_modules exclude, the result is: ONLY
      # the actual runtime prod deps (better-sqlite3 native binary + bindings
      # helper) end up in the VSIX. dev deps stay out. esbuild already bundled
      # everything else (including @ace-sdk/core, linguist-js, skott) into
      # dist/extension.js.
      - name: Publish to Open VSX
        uses: HaaLeo/publish-vscode-extension@v2
        with:
          pat: ${{ secrets.OPEN_VSX_TOKEN }}
